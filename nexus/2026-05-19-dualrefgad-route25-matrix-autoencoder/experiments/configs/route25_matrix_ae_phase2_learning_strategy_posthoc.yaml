program: experiments/scripts/route25_matrix_ae_phase2_learning_strategy_posthoc.py
method: diagnostic
parameters:
  dataset:
    value: elliptic
  source_phase1:
    value: experiments/outputs/route25_matrix_ae_phase1_instability_audit.json
  training_cost:

program: experiments/scripts/pseudo_real_distribution_alignment_probe.py
method: diagnostic
parameters:
  dataset:
    value: elliptic
  seeds:
    value: "0,1,2,3,4"
  variants:
    value: old_exact_080_regime
  pseudo_strategies:
    value: "v0_mixed,dense_soft_shift,dense_hard_shift,sparse_tail_boost,mixed_signed,normal_shell,tail_quantile_match"
  train_rate:
    value: 0.05
  val_rate:
    value: 0.0
  normal_k:
    value: 4
  anom_k:
    value: 16
  encode_batch_size:
    value: 1024
  ref_block_size:
    value: 1024
  normal_val_frac:
    value: 0.25
  pseudo_noise_scale:
    value: 1.0
  pseudo_tail_boost:
    value: 1.0
notes:
  protocol: "Runner-registered pure diagnostic probe. Fixed C-LEG3 / old_exact response matrix. True anomaly labels diagnostic-only."
  objective: "Compare multiple pseudo-anomaly generation strategies and measure four gates: pseudo-real alignment, pseudo difficulty, direction consistency, and fixed-regime readout relevance."
  controlled_variables: "same reference construction, fixed C-LEG3 response matrix, no model training, elliptic, seeds 0-4; only pseudo strategy changes."
  expected_output: "experiments/outputs/pseudo_strategy_gate_probe.json"
  next_gate: "Only strategies that pass alignment/difficulty/direction gates should be considered for a later trainable D-MiT head; otherwise fix pseudo generation before adding heads."

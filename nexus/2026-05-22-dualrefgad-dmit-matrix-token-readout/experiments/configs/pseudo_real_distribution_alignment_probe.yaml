program: experiments/scripts/pseudo_real_distribution_alignment_probe.py
method: diagnostic
parameters:
  dataset:
    value: elliptic
  seeds:
    value: "0,1,2,3,4"
  variants:
    value: old_exact_080_regime
  train_rate:
    value: 0.05
  val_rate:
    value: 0.0
  normal_k:
    value: 4
  anom_k:
    value: 16
  encode_batch_size:
    value: 1024
  ref_block_size:
    value: 1024
  normal_val_frac:
    value: 0.25
  pseudo_noise_scale:
    value: 1.0
  pseudo_tail_boost:
    value: 1.0
notes:
  protocol: "Runner-registered pure diagnostic probe. Fixed C-LEG3 / old_exact response matrix. True anomaly labels diagnostic-only."
  objective: "Measure distribution alignment/misalignment between V0 pseudo anomalies, real anomalies, and normals in response-matrix feature space."
  controlled_variables: "same reference construction and V0 pseudo generation as v0_set_dmit_probe; no model training; seeds 0-4."
  expected_output: "experiments/outputs/pseudo_real_distribution_alignment_probe.json"
  next_gate: "If pseudo anomalies are farther from normals than real anomalies or misaligned on high-response features, redesign pseudo generation before adding more heads."

program: outputs/normality_diagnostic/stage1_relation_mlp_margin_regression.py
method: grid
metric:
  name: spearman_score_margin
  goal: maximize
parameters:
  dataset:
    value: elliptic
  seed:
    value: 0
  train_rate:
    value: 0.05
  val_rate:
    value: 0.0
  device:
    value: 0
  num_epoch:
    value: 50
  input_mode:
    values: [ud, ud_prod_absdiff, h_rn_ra_ud]
  neg_mode:
    value: none
  hidden:
    values: [128, 256, 512]
  dropout:
    value: 0.1
  lr:
    value: 0.001
  weight_decay:
    value: 0.0001
  gamma:
    value: 0.1
  wandb:
    value: true
  descriptor_mode:
    value: hop_attr
  pn_estimator:
    value: pca_residual
  gn_mode:
    value: label_gate
  ln_mode:
    value: descriptor_similarity
  ga_mode:
    value: normal_soft_or
  la_mode:
    value: descriptor_similarity
  normal_k:
    value: 4
  anom_k:
    value: 16
  encode_batch_size:
    value: 512
command:
  - ${env}
  - python
  - ${program}
  - ${args}

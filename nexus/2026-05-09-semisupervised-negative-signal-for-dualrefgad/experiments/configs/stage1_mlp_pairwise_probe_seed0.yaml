program: outputs/normality_diagnostic/stage1_mlp_pairwise_probe.py
method: grid
metric:
  name: test_ap
  goal: maximize
parameters:
  dataset:
    value: elliptic
  seed:
    value: 0
  train_rate:
    value: 0.05
  val_rate:
    value: 0.0
  device:
    value: 0
  num_epoch:
    value: 50
  hidden:
    value: 16
  dropout:
    value: 0.0
  lr:
    value: 0.001
  weight_decay:
    value: 0.0001
  gamma:
    value: 0.1
  neg_mode:
    value: N2_direction
  preserve_weight:
    value: 0.05
  descriptor_mode:
    value: hop_attr
  pn_estimator:
    value: pca_residual
  gn_mode:
    value: label_gate
  ln_mode:
    value: descriptor_similarity
  ga_mode:
    value: normal_soft_or
  la_mode:
    value: descriptor_similarity
  normal_k:
    value: 4
  anom_k:
    value: 16
  encode_batch_size:
    value: 512
  out:
    value: outputs/stage1_probe/stage1_mlp_pairwise_N2_seed0_e50_skill.json
command:
  - ${env}
  - python
  - ${program}
  - ${args}

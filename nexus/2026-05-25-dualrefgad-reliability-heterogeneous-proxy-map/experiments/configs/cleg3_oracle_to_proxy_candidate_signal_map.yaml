notes:
  protocol: runner-registered bundled multi-seed pure probe; frozen C-LEG3 / old_exact response regime; no training
  critical_fix: force data_split_seed=seed and sequential seed execution to prevent load_mat global random.shuffle cross-thread drift
  label_boundary: anomaly labels diagnostic-only for AUC/AP and oracle top-K boundary categories; no training, no early stopping, no threshold selection
  objective: map oracle boundary categories to no-label proxy features and test row/column reliability plus heterogeneous-support no-training readouts
  controlled_variables: fixed old_exact_080_regime, normal_k=4, anom_k=16, train_rate=0.05, val_rate=0.0
  continuation_gate: proceed to shallow reliability gate only if a candidate is near/above mat_mean or improves lost-anomaly/removed-FP tradeoff without being a margin/mat_mean/degree/rejection shortcut
